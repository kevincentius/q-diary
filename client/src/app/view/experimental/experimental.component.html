<div class="experimental">
  <h1>Experimental - Concat</h1>

  <div class="inputs">
    <div class="field">
      <label for="start">Start</label>
      <input
        id="start"
        type="datetime-local"
        [ngModel]="startDateTime()"
        (ngModelChange)="startDateTime.set($event)"
      />
    </div>
    <div class="field">
      <label for="end">End</label>
      <input
        id="end"
        type="datetime-local"
        [ngModel]="endDateTime()"
        (ngModelChange)="endDateTime.set($event)"
      />
    </div>
    <label class="checkbox">
      <input
        type="checkbox"
        [ngModel]="includeTimeSpent()"
        (ngModelChange)="includeTimeSpent.set($event)"
      />
      Include time spent
    </label>
    <button (click)="concat()" [disabled]="loading()">
      {{ loading() ? 'Processing...' : 'Concat' }}
    </button>
  </div>

  @if (result()) {
    <div class="result-info">Content length: {{ contentLength }} chars</div>
    <textarea readonly [value]="result()"></textarea>
  }
</div>
